# Fleet-wide tool pins, materialized by `mise install` during `./install.sh dev`.
# Installed as a conf.d drop-in; the config profile also creates an empty
# ~/.config/mise/config.toml so `mise use -g` edits that file, never this one.
[tools]
neovim = "0.11"

[settings]
# Honor .node-version files (nodenv-style) for per-project node selection.
idiomatic_version_file_enable_tools = ["node"]
