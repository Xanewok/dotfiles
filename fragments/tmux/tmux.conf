set -g default-terminal "screen-256color"

# Claude Code compatibility inside tmux:
#   - allow-passthrough: lets desktop notifications and the progress bar reach
#     the outer terminal instead of being swallowed by tmux.
#   - extended-keys / terminal-features: let tmux distinguish Shift+Enter from
#     plain Enter, so the newline shortcut works in the prompt.
# https://code.claude.com/docs/en/terminal-config#configure-tmux
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g pane-border-status top
set -g focus-events on
